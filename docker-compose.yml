# Seance 14 - TP docker-compose : orchestrez votre stack de classification.
# Squelette a completer (marqueurs TODO S14-n). Voir tp/TP_S14_docker_compose.md.
#
# Services : mlflow (suivi), train (entrainement one-shot, profil "train"),
#            api (FastAPI) et frontend (Streamlit).
#
# Commandes (depuis la racine du projet) :
#   docker compose -f docker-compose.yml up -d mlflow
#   docker compose -f docker-compose.yml --profile train run --rm train
#   docker compose -f docker-compose.yml up -d api frontend
#   -> API sur http://localhost:8000, frontend sur http://localhost:8501

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
      MLFLOW_DISABLE_ENV_MANAGER_CONDA_WARNING: "true"
      # CORS configuration pour accès public (à adapter selon l'IP réelle)
      MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: "http://88.96.57.10:5000"
      # Allowed hosts : IP publique (navigateur) + nom service Docker (conteneurs internes) + localhost (local)
      MLFLOW_SERVER_ALLOWED_HOSTS: "88.96.57.10:5000,mlflow:5000,localhost:5000,127.0.0.1:5000"
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
    # EXPOSE PUBLIQUEMENT pour la demo (le prof consulte l'UI MLflow depuis son
    # navigateur). ATTENTION : MLflow n'a AUCUNE authentification -> a re-securiser
    # apres la demo en remettant "127.0.0.1:5000:5000" (loopback + tunnel SSH).
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bankmarketing
      MYSQL_USER: bank
      MYSQL_PASSWORD: bank
    # Bind sur loopback : la base n'est JAMAIS exposee a l'exterieur (securite).
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ubank", "-pbank"]
      interval: 5s
      timeout: 5s
      retries: 20

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    # Entraine et ecrit models/model.joblib dans le volume partage models_data.
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_started
    volumes:
      - models_data:/app/models
    # Le profil "train" evite que ce service one-shot demarre avec `up`.
    profiles:
      - train

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    # Journal de predictions : l'API joint MySQL via le nom de service `mysql`.
    environment:
      DATABASE_URL: mysql+pymysql://bank:bank@mysql:3306/bankmarketing
      MODEL_VERSION: "1"
      # MLflow : fail fast si indisponible au startup (ne pas bloquer 3+ min avec retries)
      MLFLOW_HTTP_REQUEST_MAX_RETRIES: "1"
      MLFLOW_HTTP_REQUEST_TIMEOUT: "3"
    depends_on:
      mysql:
        condition: service_healthy
      mlflow:
        condition: service_started
    # S14-1 : expose l'API sur le port 8000
    ports:
      - "8000:8000"
    # S14-2 : lit le modele produit par le service `train` (volume partage, RO)
    volumes:
      - models_data:/app/models:ro
    # S14-3 : healthcheck sur GET /health
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    # S14-4 : l'API et MLflow sont joignables par leur nom de service (reseau interne).
    environment:
      API_URL: http://api:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # URLs publiques (navigateur) pour les liens cliquables du dashboard.
      # A definir dans .env sur la VM, ex. MLFLOW_UI_URL=http://88.96.57.10:5000
      # API_PUBLIC_URL=http://88.96.57.10:8000. Vides -> liens masques (local).
      MLFLOW_UI_URL: ${MLFLOW_UI_URL:-}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-}
      AIRFLOW_UI_URL: ${AIRFLOW_UI_URL:-}
      GITHUB_URL: ${GITHUB_URL:-https://github.com/goamegah/mlops}
    # S14-5 : seul le frontend est expose a l'exterieur (point d'entree public).
    ports:
      - "8501:8501"
    # S14-6 : attendre que l'API soit saine avant de demarrer.
    depends_on:
      api:
        condition: service_healthy

  # Seance 17 - Airflow : DAG de re-entrainement planifie (prepare -> train -> qualite).
  # Mode `standalone` (scheduler + UI + SQLite en un process) : suffisant pour la demo.
  airflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    command: standalone
    environment:
      # src/ sur le PYTHONPATH -> le DAG importe `bank_marketing`. Comme src est
      # monte en /opt/airflow/src, config.ROOT vaut /opt/airflow et le DAG ecrit
      # data/ et models/ sous /opt/airflow (volume airflow_home, accessible en ecriture).
      PYTHONPATH: /opt/airflow/src
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # EXPOSE pour la demo : l'UI Airflow est protegee par login (user admin +
    # mot de passe genere), l'exposition est donc acceptable. Ouvrir le port 8080
    # (OCI Security List + iptables). Re-securisable en "127.0.0.1:8080:8080".
    ports:
      - "8080:8080"
    volumes:
      - airflow_home:/opt/airflow      # persiste SQLite (runs + user admin), logs, data/, models/
      - ./dags:/opt/airflow/dags       # le DAG (modifiable a chaud)
      - ./src:/opt/airflow/src         # le package bank_marketing

volumes:
  mlflow_data:
  models_data:
  mysql_data:
  airflow_home:
